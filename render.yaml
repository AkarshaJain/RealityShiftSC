# Render.com Blueprint for ShelfSense backend.
# Docs: https://render.com/docs/blueprint-spec
#
# This file tells Render how to build and run the backend as a public
# HTTPS web service on the free tier. No credit card required.
#
# To deploy:
#   1. Push this file to GitHub (same repo as /backend).
#   2. On Render.com → New → Blueprint → connect the repo.
#   3. Render reads this file and creates the service automatically.

services:
  - type: web
    name: shelfsense-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    # --include=dev forces TypeScript + @types/* to install even though
    # NODE_ENV=production is set below (npm would otherwise skip devDeps).
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "true"
      # PORT is injected by Render automatically; our config.ts reads it.
